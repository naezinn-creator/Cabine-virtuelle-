<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NAE Beauty</title>
<style>
body { 
    font-family:Times New Roman; 
    text-align:center; 
    margin:20px; 
    background-image: url('https://i.goopics.net/74er1u.png'); 
    color: #570000;
    background-size: cover;       
    background-position: center;  
    background-repeat: no-repeat;
}

/* Conteneur principal pour avatar + menus */
#main-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px; /* espace entre avatar et menus */
}

/* Avatar */
#avatar-container {
    width: 50%;
    max-width: 650px;
    aspect-ratio: 650 / 1200;
    border: 10px solid #570000; /* frame autour de l'avatar */
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    position: relative;
}

/* Tous les calques */
#avatar-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: opacity 0.3s ease-in-out;
    opacity: 1;
}

/* Menus */
#menus-container {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
background-color: rgba(255,255,255,0.7); /* fond semi-transparent */
    border: 2px solid #570000;              /* bordure de la même couleur que le thème */
    border-radius: 6px;                      /* coins arrondis */
    padding: 5px 8px;                        /* espace intérieur */
    margin: 5px 0;                           /* es
}

/* Nom du calque */
#layer-name {
    margin-bottom: 15px;
    font-weight: bold;
    font-size: 16px;
    color: #570000;
}

/* Boutons stylés */
.category { margin: 10px 0; }
button { 
    margin: 2px; 
    padding: 5px 10px; 
    font-size:12px; 
    background-color :#570000; 
    color :#f7efe8; 
    border-radius:4px; 
    cursor:pointer;

}
button:hover { 
    background-color:#a52c2c; 
}
</style>
</head>
<body>

<h2>NAE Beauty</h2>

<div id="main-container">
  <div id="avatar-container">
    <img id="base" src="https://i.goopics.net/fq33mi.png" alt="Avatar de base">
  </div>
  <div id="menus-container">
    <div id="layer-name"></div>
    <div id="menus"></div>
  </div>
</div>

<script>
// Définition des catégories avec noms et sources
const categories = {
  "peau": [{name: "Peau claire", src: "peau/peau.png"}],
  "tenues intégrales": [{name: "Tenue Classique", src: "tenues1.png"}],
  "tops": [
    {name: "T-shirt rouge", src: "https://i.goopics.net/7bucuu.png"},
    {name: "Top bleu", src: "tops/top2.png"}
  ],
  "bas": [
    {name: "Jean", src: "bas/bas1.png"},
    {name: "Jupe", src: "bas/bas2.png"}
  ],
  "cheveux": [
    {name: "Cheveux courts", src: "cheveux/cheveux1.png"},
    {name: "Cheveux longs", src: "cheveux/cheveux2.png"}
  ],
  "yeux": [{name: "Yeux marron", src: "yeux/yeux1.png"}],
  "sourcils": [{name: "Sourcils naturels", src: "sourcils/sourcils1.png"}],
  "nez": [{name: "Nez classique", src: "nez/nez1.png"}],
  "bouche": [{name: "Bouche rouge", src: "bouche/bouche1.png"}],
  "maquillage": [{name: "Maquillage simple", src: "maquillage/maquillage1.png"}],
  "bijoux": [{name: "Boucles d'oreilles", src: "bijoux/bijoux1.png"}],
  "chaussures": [{name: "Chaussures classiques", src: "chaussures/chaussures1.png"}]
};

const avatarContainer = document.getElementById("avatar-container");
const menusDiv = document.getElementById("menus");
const layerNameDiv = document.getElementById("layer-name");
const layers = {};
const indices = {};

// Création des calques et menus
for(let cat in categories){
  const img = document.createElement("img");
  img.id = cat;
  img.style.display = "none"; 
  img.src = categories[cat][0].src;
  avatarContainer.appendChild(img);
  layers[cat] = img;
  indices[cat] = 0;

  const menu = document.createElement("div");
  menu.className = "category";
  const label = document.createElement("strong");
  label.innerText = cat.toUpperCase() + ": ";
  menu.appendChild(label);

  // Bouton précédent
  const prev = document.createElement("button");
  prev.innerText = "<";
  prev.onclick = ()=>{
    indices[cat]--;
    if(indices[cat] < -1) indices[cat] = categories[cat].length-1;
    updateLayer(cat);
  };
  menu.appendChild(prev);

  // Bouton suivant
  const next = document.createElement("button");
  next.innerText = ">";
  next.onclick = ()=>{
    indices[cat]++;
    if(indices[cat] > categories[cat].length-1) indices[cat] = -1;
    updateLayer(cat);
  };
  menu.appendChild(next);

  menusDiv.appendChild(menu);
}

// Fonction pour mettre à jour l’affichage
function updateLayer(cat){
  const idx = indices[cat];
  if(idx === -1){
    layers[cat].style.opacity = 0;
    setTimeout(()=>{ layers[cat].style.display = "none"; }, 300);
    layerNameDiv.innerText = "";
  } else {
    layers[cat].style.opacity = 0;
    layers[cat].style.display = "block";
    setTimeout(()=>{
      layers[cat].src = categories[cat][idx].src;
      layers[cat].style.opacity = 1;
    }, 50);

    layerNameDiv.innerText = categories[cat][idx].name;
  }

  // Si c’est une tenue intégrale, masquer top, bas et chaussures
  if(cat === "tenues intégrales" && idx !== -1){
    ["tops","bas","chaussures"].forEach(c=>{
      layers[c].style.display = "none";
      indices[c] = -1;
    });
  }
}
</script>

</body>
</html>
